name: Formula PR On Tag

on:
  push:
    tags:
      - "v*"

concurrency:
  group: formula-pr-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update formula from tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          chmod +x tools/update-formula-from-tag.sh
          tools/update-formula-from-tag.sh "$TAG"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(formula): update for ${{ github.ref_name }}"
          title: "chore(formula): update for ${{ github.ref_name }}"
          body: |
            Automated update of Homebrew formula for tag `${{ github.ref_name }}`.

            - Updated `Formula/gsb.rb` with release URL and SHA256.
            - Generated by workflow `.github/workflows/formula-pr-on-tag.yml`.
          branch: "automation/formula-${{ github.ref_name }}"
          base: main
          add-paths: |
            Formula/gsb.rb

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
